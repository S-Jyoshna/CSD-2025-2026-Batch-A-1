<!-- FINAL User Login page: single template for all user login (Home, post-registration, Apply for Loan redirect). -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Login - LoanPortal Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(23, 42, 58, 0.9), rgba(23, 42, 58, 0.92)),
                url('https://images.unsplash.com/photo-1601597111158-2fceff292cdc?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #333;
            position: relative;
        }
        .login-card {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 12px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        .login-card .card-header {
            background: linear-gradient(135deg, #1a4a5a, #2b7a78);
            color: white;
            padding: 24px;
            text-align: center;
        }
        .login-card .card-header h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 6px 0; }
        .login-card .card-header p { margin: 0; opacity: 0.9; font-size: 0.95rem; }
        .login-card .card-body { padding: 28px; }
        .login-card .form-label { font-weight: 500; color: #444; }
        .login-card .form-control:focus { border-color: #1a4a5a; box-shadow: 0 0 0 0.2rem rgba(26, 74, 90, 0.2); }
        .btn-login {
            background: linear-gradient(135deg, #1a4a5a, #2b7a78);
            color: white;
            border: none;
            padding: 12px 24px;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
        }
        .btn-login:hover { color: white; opacity: 0.95; }
        .login-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 0.95rem;
        }
        .login-footer a { color: #1a4a5a; font-weight: 500; }
        .input-group-text { background: #f0f4f5; border-color: #dee2e6; }
        /* Back to Home: visible but not dominant; keeps navigation clear without competing with login CTA */
        .back-to-home {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .back-to-home:hover { color: #fff; }
    </style>
</head>
<body>
    <!-- Navigation: return to App Home from login without changing URLs -->
    <a href="{% url 'index' %}" class="back-to-home" title="Return to home page"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <div class="login-card">
        <div class="card-header">
            <h1><i class="fas fa-user me-2"></i>User Login</h1>
            <p>Access your loan management dashboard</p>
        </div>
        <div class="card-body">
            {% if msg %}
            <div class="alert alert-danger mb-3" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>{{ msg }}
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Username / Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Enter username or email" required autocomplete="username" />
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
                    </div>
                </div>
                <button type="submit" class="btn btn-login">Login</button>
            </form>

            <div class="login-footer">
                New user? <a href="{% url 'signup' %}">Register here</a>
            </div>
        </div>
    </div>

    <script>
        var user = sessionStorage.getItem('user');
        if (user != null) window.location.href = '/home/';
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
