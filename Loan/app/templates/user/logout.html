<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logging out...</title>
</head>
<body>
    <script>
        // Clear client-side session to prevent legacy redirect loops.
        try { sessionStorage.clear(); } catch (e) {}
        window.location.href = "/";
    </script>
    <noscript>
        Logged out. <a href="/">Go to home</a>
    </noscript>
</body>
</html>
