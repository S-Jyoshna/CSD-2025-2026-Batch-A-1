<!-- Admin Login page: styled consistently with User Login (same card layout); distinct header color and badge. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - LoanPortal Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(33, 71, 75, 0.9), rgba(33, 71, 75, 0.92)),
                url('https://images.unsplash.com/photo-1601597111158-2fceff292cdc?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #333;
            position: relative;
        }
        .login-card {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 12px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        /* Distinct from User Login: darker header and admin subtitle */
        .login-card .card-header {
            background: linear-gradient(135deg, #21474b, #183638);
            color: white;
            padding: 24px;
            text-align: center;
        }
        .login-card .card-header .badge-admin {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .login-card .card-header h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 6px 0; }
        .login-card .card-header p { margin: 0; opacity: 0.9; font-size: 0.95rem; }
        .login-card .card-body { padding: 28px; }
        .login-card .form-label { font-weight: 500; color: #444; }
        .login-card .form-control:focus { border-color: #21474b; box-shadow: 0 0 0 0.2rem rgba(33, 71, 75, 0.2); }
        .btn-login {
            background: linear-gradient(135deg, #21474b, #183638);
            color: white;
            border: none;
            padding: 12px 24px;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
        }
        .btn-login:hover { color: white; opacity: 0.95; }
        .login-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 0.9rem;
            color: #666;
        }
        .login-footer a { color: #21474b; font-weight: 500; }
        .input-group-text { background: #f0f4f5; border-color: #dee2e6; }
        /* Back to Home: visible but not dominant; consistent with User Login page */
        .back-to-home {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .back-to-home:hover { color: #fff; }
    </style>
</head>
<body>
    <!-- Navigation: return to App Home from admin login -->
    <a href="{% url 'index' %}" class="back-to-home" title="Return to home page"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <div class="login-card">
        <div class="card-header">
            <span class="badge-admin">Administrator</span>
            <h1><i class="fas fa-user-shield me-2"></i>Admin Login</h1>
            <p>Access your administrator dashboard</p>
        </div>
        <div class="card-body">
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="adminEmail" class="form-label">Admin username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="adminEmail" name="email" placeholder="Admin email" required autocomplete="username" />
                    </div>
                </div>
                <div class="mb-3">
                    <label for="adminPassword" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="adminPassword" name="password" placeholder="Enter password" required autocomplete="current-password" />
                    </div>
                </div>
                <button type="submit" class="btn btn-login">Login</button>
            </form>

            <div class="login-footer">
                Secure access to loan management system
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
